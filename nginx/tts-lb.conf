# ─────────────────────────────────────────────────────────────────────────────
# Kokoro TTS Load Balancer — nginx config
# Install on: Voice Bridge EC2 (43.205.237.157)
# Listens on port 8002 locally → forwards to RunPod GPU pods
#
# Deploy steps:
#   1. Copy this file to /etc/nginx/conf.d/tts-lb.conf
#   2. Fill in the actual RunPod pod IPs/hostnames below
#   3. nginx -t && systemctl reload nginx
#
# Each RunPod pod runs: docker compose up tts-server
# Pods expose port 8002. RunPod assigns a public URL per pod, e.g.:
#   <pod-id>-8002.proxy.runpod.net  (or direct IP if private networking)
# ─────────────────────────────────────────────────────────────────────────────

# Worker pool — 6 × T4 pods
# Replace the placeholder addresses with your actual RunPod pod IPs/hostnames.
# Use RunPod's private network IPs if all pods are in the same VPC,
# otherwise use the public proxy URLs.
upstream tts_backend {
    # Round-robin by default; least_conn gives better latency distribution
    # when synthesis times vary (longer sentences → longer requests).
    least_conn;

    # ── RunPod pod IPs — update these when you spin up pods ──────────────────
    server POD_1_IP:8002  max_fails=2  fail_timeout=10s;
    server POD_2_IP:8002  max_fails=2  fail_timeout=10s;
    server POD_3_IP:8002  max_fails=2  fail_timeout=10s;
    server POD_4_IP:8002  max_fails=2  fail_timeout=10s;
    server POD_5_IP:8002  max_fails=2  fail_timeout=10s;
    server POD_6_IP:8002  max_fails=2  fail_timeout=10s;

    # Keep connections alive between requests — eliminates TCP handshake
    # overhead when the bridge sends dozens of synthesis requests per minute.
    keepalive 64;
}

server {
    # Listen on localhost:8002 — tata-voice-bridge calls LOCAL_TTS_URL=http://localhost:8002
    # No change needed in the bridge .env.
    listen 127.0.0.1:8002;
    server_name localhost;

    # TTS responses can be large (full utterance PCM).
    # Kokoro is fast but GPU queue can add latency under peak load.
    proxy_connect_timeout  5s;
    proxy_read_timeout    90s;
    proxy_send_timeout    10s;

    # Use HTTP/1.1 for keepalive
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Pass real client IP for logging
    proxy_set_header   X-Real-IP        $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

    location / {
        proxy_pass http://tts_backend;
    }

    # Health check endpoint — returns 200 when at least one backend is up
    location /health {
        proxy_pass http://tts_backend/health;
    }
}
